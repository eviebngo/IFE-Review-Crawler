name: Backfill Missing Transcripts

on:
  workflow_dispatch:  # run manually from GitHub Actions tab

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch missing transcripts
        env:
          WHISPER_MODEL: base
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: python backfill_transcripts.py

      - name: Save updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ife_cache.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: backfill transcripts (YouTube + Whisper)"
            git push
          fi
