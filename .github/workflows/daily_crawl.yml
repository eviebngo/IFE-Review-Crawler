name: Daily IFE Crawl

on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC every day
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the updated cache back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawl
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          WHISPER_MODEL: base
        run: python daily_crawl.py

      - name: Save updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ife_cache.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily IFE cache update"
            git push
          fi
